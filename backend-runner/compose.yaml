version: "3.8"
services:
  app:
    image: ghcr.io/oldpersiangames/opgmanager-backend:main
    restart: unless-stopped
    ports:
      - 8000:80
    networks:
      - app-network
  db:
    image: mysql:8.3
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: opg
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_PASSWORD: 123456
      MYSQL_USER: opg
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
